<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - Premium Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS sama persis seperti sebelumnya - saya potong untuk hemat space */
        :root {
            --primary: #1b5e20;
            --accent: #4caf50;
            --accent-light: #e8f5e9;
            --bg-color: #f8faf9;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --radius: 20px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: var(--text-main); overflow-x: hidden; }
        .hidden { display: none !important; }

        /* LOADING SCREEN DIPERBAIKI */
        #loader { 
            position: fixed; 
            inset: 0; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            gap: 20px;
        }
        .spinner { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        #loader-text { font-weight: 500; color: var(--primary); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ERROR SCREEN BARU */
        .error-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: var(--shadow-lg);
            max-width: 500px;
            width: 100%;
        }
        .error-icon { font-size: 4rem; color: #f44336; margin-bottom: 20px; }
        .error-title { color: var(--primary); font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .error-message { color: var(--text-muted); margin-bottom: 30px; line-height: 1.6; }
        .btn-retry { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem; }

        /* Sisanya sama - dashboard-topbar, grid, modal, etc */
        /* ... (copy CSS lengkap dari kode sebelumnya) ... */
    </style>
</head>
<body>

    <!-- LOADING SCREEN DENGAN TEXT -->
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Memuat aplikasi...</div>
    </div>

    <!-- ERROR SCREEN -->
    <div id="error-screen" class="error-screen hidden">
        <div class="error-card">
            <div class="error-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h2 class="error-title" id="error-title">Terjadi Kesalahan</h2>
            <p class="error-message" id="error-message">Tidak dapat terhubung ke server.</p>
            <button class="btn-retry" onclick="retryApp()">Coba Lagi</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-muted);">
                Pastikan internet stabil dan refresh halaman
            </p>
        </div>
    </div>

    <!-- AUTH & DASHBOARD (sama seperti sebelumnya) -->
    <!-- ... copy lengkap HTML dari kode sebelumnya ... -->

    <script type="module">
        // TIMEOUT LOADING 10 DETIK
        let loadingTimeout = setTimeout(showError, 10000);

        function showError(message = 'Koneksi gagal atau server tidak responsif') {
            document.getElementById('loader').classList.add('hidden');
            const errorScreen = document.getElementById('error-screen');
            document.getElementById('error-title').textContent = 'Loading Terlalu Lama';
            document.getElementById('error-message').textContent = message;
            errorScreen.classList.remove('hidden');
        }

        function hideLoader() {
            clearTimeout(loadingTimeout);
            document.getElementById('loader').classList.add('hidden');
        }

        window.retryApp = async () => {
            document.getElementById('error-screen').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('loader-text').textContent = 'Mencoba ulang...';
            loadingTimeout = setTimeout(showError, 10000);
            await initializeAppFull();
        };

        // FIREBASE INIT DENGAN ERROR HANDLING
        async function initializeAppFull() {
            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js");
                const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js");
                const { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                const firebaseConfig = {
                    apiKey: "AIzaSyA0aIG6_HpP_JTrKQPG1mzoAsyu4KotaHk",
                    authDomain: "english300-e6dd6.firebaseapp.com",
                    projectId: "english300-e6dd6",
                    storageBucket: "english300-e6dd6.firebasestorage.app",
                    messagingSenderId: "1036309233436",
                    appId: "1:1036309233436:web:a43155ff8762f4d66684d9"
                };

                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                // Auth handler dengan error handling
                onAuthStateChanged(auth, async (user) => {
                    try {
                        if (user) {
                            currentUser = user;
                            await fetchProgress();
                            showSection('dashboard');
                            hideLoader();
                        } else {
                            showSection('auth');
                            hideLoader();
                        }
                    } catch (err) {
                        console.error('Auth error:', err);
                        showError('Gagal memuat data user: ' + err.message);
                    }
                });

                // Expose globals
                window.auth = auth;
                window.db = db;

            } catch (err) {
                console.error('Firebase init failed:', err);
                showError('Gagal memuat Firebase: ' + err.message);
            }
        }

        // OFFLINE DETECTION
        window.addEventListener('online', () => {
            if (document.getElementById('error-screen').classList.contains('hidden') === false) {
                retryApp();
            }
        });

        window.addEventListener('offline', () => {
            showError('Koneksi internet terputus');
        });

        // INIT APP
        initializeAppFull();

        // Sisanya sama (authForm, toggleAuthBtn, renderGrid, dll)
        let currentUser = null;
        let completedDays = [];

        // Copy semua function dari kode sebelumnya...
        // (fetchProgress, renderGrid, openViewer, dll)

        function showSection(id) {
            document.getElementById('auth-section').classList.toggle('hidden', id !== 'auth');
            document.getElementById('dashboard-section').classList.toggle('hidden', id !== 'dashboard');
        }
    </script>
</body>
</html>
