<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - 300 Days Premium Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b5e20; /* Darker Green Premium */
            --accent: #4caf50;
            --bg-color: #f0f4f2;
            --white: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --radius: 20px;
            --shadow: 0 15px 35px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: var(--white); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }

        /* --- UI LOGIN / REGISTER --- */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%); }
        .auth-card { background: var(--white); padding: 50px 40px; border-radius: 30px; box-shadow: var(--shadow); width: 100%; max-width: 450px; text-align: center; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .auth-card h1 { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .auth-card p.welcome-text { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--primary); display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 14px 18px; border: 2px solid #f1f1f1; border-radius: 15px; font-family: inherit; font-size: 0.95rem; transition: var(--transition); background: #fdfdfd; }
        .form-group input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 600; width: 100%; font-size: 1rem; transition: var(--transition); box-shadow: 0 8px 20px rgba(27, 94, 32, 0.2); }
        .btn-main:hover { background: #0e3d11; transform: translateY(-2px); }

        /* --- DASHBOARD --- */
        .dashboard-header { background: var(--white); padding: 30px; border-radius: 25px; box-shadow: var(--shadow); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--primary); }
        .dashboard-header h2 { font-size: 1.3rem; }
        .btn-logout { background: #fff1f0; color: #ff4757; border: 1px solid #ffccc7; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }

        .stats-box { background: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%); color: white; padding: 30px; border-radius: 25px; margin-bottom: 40px; box-shadow: var(--shadow); }
        .progress-container { margin: 20px 0; }
        .bar-bg { background: rgba(255,255,255,0.2); height: 12px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: #fff; height: 100%; width: 0%; transition: 1s ease; box-shadow: 0 0 15px rgba(255,255,255,0.5); }

        .grid-materi { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .day-card { background: var(--white); padding: 25px; border-radius: 22px; text-align: center; cursor: pointer; box-shadow: var(--shadow); border: 2px solid transparent; transition: var(--transition); position: relative; }
        .day-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .day-card .icon-circle { width: 60px; height: 60px; background: var(--bg-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary); font-size: 1.2rem; transition: 0.3s; }
        .day-card:hover .icon-circle { background: var(--primary); color: white; }
        .day-card.completed { background: #e8f5e9; border-color: var(--accent); }
        .day-card.completed::after { content: '\f058'; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; top: 15px; right: 15px; color: var(--primary); font-size: 1.2rem; }

        /* --- VIEWER --- */
        #viewer { position: fixed; inset: 0; background: var(--white); z-index: 1000; display: flex; flex-direction: column; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .viewer-nav { padding: 20px; background: var(--white); border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        iframe { flex-grow: 1; border: none; width: 100%; }
        .btn-finish { background: #2196f3; border-radius: 0; padding: 20px; font-size: 1.1rem; color: white; border: none; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .grid-materi { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .auth-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:var(--primary); font-weight: 600;">Memuat Kurikulum...</p>
    </div>

    <!-- UI AUTH -->
    <div id="auth-section" class="auth-wrapper hidden">
        <div class="auth-card">
            <div style="background: var(--bg-color); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="fa-solid fa-graduation-cap fa-2xl" style="color: var(--primary);"></i>
            </div>
            <h1 id="auth-title">Selamat Datang</h1>
            <p class="welcome-text" id="auth-subtitle">Silakan login untuk melanjutkan belajar</p>
            
            <div id="alert" style="padding: 12px; border-radius: 12px; background: #fff0f0; color: #ff4d4f; font-size: 0.85rem; margin-bottom: 20px;" class="hidden"></div>

            <form id="auth-form">
                <div class="form-group">
                    <label>EMAIL PENDAFTARAN</label>
                    <input type="email" id="email" placeholder="contoh: budi@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>KATA SANDI</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                </div>
                <div class="form-group" id="access-code-group">
                    <label>KODE AKSES PREMIUM</label>
                    <input type="text" id="access-code" placeholder="Masukkan kode unik pembeli">
                </div>
                <button type="submit" id="btn-submit" class="btn-main">Masuk Sekarang</button>
            </form>
            
            <p style="margin-top: 25px; font-size: 0.85rem; color: var(--text-muted);">
                <span id="toggle-text">Belum punya akses?</span> 
                <a href="#" id="toggle-auth" style="color: var(--primary); font-weight: 700; text-decoration: none;">Daftar Akun</a>
            </p>
        </div>
    </div>

    <!-- UI DASHBOARD -->
    <div id="dashboard-section" class="container hidden">
        <div class="dashboard-header">
            <div>
                <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">Premium Member</p>
                <h2 id="welcome-msg">Halo, Pelajar!</h2>
            </div>
            <button onclick="handleLogout()" class="btn-logout">Keluar <i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="stats-box">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="font-weight: 600;">Progres Belajar Anda</h3>
                <h2 id="progress-percent" style="font-weight: 700;">0%</h2>
            </div>
            <div class="progress-container">
                <div class="bar-bg"><div id="progress-fill"></div></div>
            </div>
            <p id="progress-detail" style="font-size: 0.9rem; opacity: 0.9;">Baru memulai? Yuk selesaikan hari pertama!</p>
        </div>

        <h3 style="margin-bottom: 25px; display: flex; align-items: center; gap: 10px;">
            <i class="fa-solid fa-book-quran" style="color:var(--primary)"></i> 
            Kurikulum 300 Hari
        </h3>
        <div class="grid-materi" id="materi-grid"></div>
    </div>

    <!-- UI VIEWER -->
    <div id="viewer" class="hidden">
        <div class="viewer-nav">
            <button onclick="closeViewer()" style="background:#f5f5f5; border:none; width:45px; height:45px; border-radius:50%; cursor:pointer;">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div style="text-align: center;">
                <p style="font-size: 0.7rem; color: var(--text-muted); font-weight: 700;">SEDANG BELAJAR</p>
                <h4 id="view-title">Hari 1</h4>
            </div>
            <div style="width:45px;"></div>
        </div>
        <iframe id="content-frame" src=""></iframe>
        <button id="btn-mark-complete" class="btn-finish">Tandai Sudah Selesai & Simpan Progres</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // SILAKAN PASTE FIREBASE CONFIG ANDA DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyA0aIG6_HpP_JTrKQPG1mzoAsyu4KotaHk",
            authDomain: "english300-e6dd6.firebaseapp.com",
            projectId: "english300-e6dd6",
            storageBucket: "english300-e6dd6.firebasestorage.app",
            messagingSenderId: "1036309233436",
            appId: "1:1036309233436:web:a43155ff8762f4d66684d9",
            measurementId: "G-21KSJDDXMY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;
        let currentUser = null;
        let completedDays = [];

        // DOM ELEMENTS
        const loader = document.getElementById('loader');
        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const authForm = document.getElementById('auth-form');
        const toggleAuthBtn = document.getElementById('toggle-auth');

        // Toggle Auth
        toggleAuthBtn.onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "Selamat Datang" : "Daftar Akun Baru";
            document.getElementById('auth-subtitle').textContent = isLoginMode ? "Silakan login untuk melanjutkan belajar" : "Gunakan kode akses yang sudah Anda beli";
            document.getElementById('btn-submit').textContent = isLoginMode ? "Masuk Sekarang" : "Daftar & Aktivasi";
            document.getElementById('access-code-group').classList.toggle('hidden', isLoginMode);
            document.getElementById('toggle-text').textContent = isLoginMode ? "Belum punya akses?" : "Sudah punya akun?";
            toggleAuthBtn.textContent = isLoginMode ? "Daftar Sekarang" : "Login di sini";
        };

        // Listen for Auth State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await fetchUserProgress();
                showDashboard();
            } else {
                showAuth();
            }
            setTimeout(() => { loader.classList.add('hidden'); }, 800);
        });

        async function fetchUserProgress() {
            const docRef = doc(db, "users", currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                completedDays = docSnap.data().completed || [];
            } else {
                await setDoc(docRef, { completed: [] });
                completedDays = [];
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('materi-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 300; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${completedDays.includes(i) ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">
                        <i class="fa-solid ${completedDays.includes(i) ? 'fa-check' : 'fa-play'}"></i>
                    </div>
                    <p style="font-size:0.7rem; font-weight:700; color:var(--text-muted);">MATERI</p>
                    <h4>Hari ${i}</h4>
                `;
                card.onclick = () => openViewer(i);
                grid.appendChild(card);
            }
            updateProgressUI();
        }

        function updateProgressUI() {
            const percent = Math.round((completedDays.length / 300) * 100);
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = percent + '%';
            document.getElementById('progress-detail').textContent = `${completedDays.length} dari 300 materi telah Anda kuasai!`;
        }

        // --- SISTEM KODE AKSES (SATU KODE SATU USER) ---
        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const code = document.getElementById('access-code').value;
            const alertBox = document.getElementById('alert');
            const btnSubmit = document.getElementById('btn-submit');

            alertBox.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses...';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // LOGIKA BARU: Cek ke Database Firestore
                    const codeRef = doc(db, "accessCodes", code.toUpperCase().trim());
                    const codeSnap = await getDoc(codeRef);

                    if (!codeSnap.exists()) {
                        throw new Error("Maaf, Kode Akses tidak ditemukan!");
                    }
                    
                    if (codeSnap.data().isUsed === true) {
                        throw new Error("Maaf, Kode Akses ini sudah digunakan orang lain!");
                    }

                    // Jika kode valid & belum dipakai -> Buat User
                    await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Update kode di database jadi 'Sudah Terpakai'
                    await updateDoc(codeRef, { isUsed: true, usedBy: email });
                }
            } catch (err) {
                alertBox.textContent = err.message;
                alertBox.classList.remove('hidden');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = isLoginMode ? "Masuk Sekarang" : "Daftar & Aktivasi";
            }
        };

        // Viewer Logic
        let currentDay = 0;
        window.openViewer = (day) => {
            currentDay = day;
            document.getElementById('view-title').textContent = "Hari " + day;
            document.getElementById('content-frame').src = `hari${day}.html`;
            document.getElementById('viewer').classList.remove('hidden');
            
            const btn = document.getElementById('btn-mark-complete');
            if(completedDays.includes(day)) {
                btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Sudah Anda Selesaikan';
                btn.disabled = true;
                btn.style.background = "#aaa";
            } else {
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Selesaikan Hari Ini';
                btn.disabled = false;
                btn.style.background = "#2196f3";
            }
        };

        window.closeViewer = () => {
            document.getElementById('viewer').classList.add('hidden');
            document.getElementById('content-frame').src = "";
        };

        document.getElementById('btn-mark-complete').onclick = async () => {
            const docRef = doc(db, "users", currentUser.uid);
            await updateDoc(docRef, { completed: arrayUnion(currentDay) });
            completedDays.push(currentDay);
            renderGrid();
            closeViewer();
        };

        window.handleLogout = () => {
            if(confirm("Yakin ingin keluar?")) signOut(auth);
        };
        function showDashboard() { 
            authSection.classList.add('hidden'); 
            dashboardSection.classList.remove('hidden'); 
            document.body.style.background = "#f0f4f2";
        }
        function showAuth() { 
            authSection.classList.remove('hidden'); 
            dashboardSection.classList.add('hidden'); 
            document.body.style.background = "#1b5e20";
        }
    </script>
</body>
</html>
