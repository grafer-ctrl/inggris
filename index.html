<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - Premium Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #4caf50;
            --bg-color: #f8faf9;
            --white: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --radius: 20px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: var(--text-main); }
        .hidden { display: none !important; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- UI LOGIN / REGISTER --- */
        .auth-wrapper { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%);
            padding: 20px;
        }
        .auth-card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: var(--shadow); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
        }
        .auth-card h2 { font-weight: 700; color: var(--primary); margin-bottom: 5px; }
        .auth-card p.subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { font-size: 0.7rem; font-weight: 700; color: var(--primary); display: block; margin-bottom: 7px; letter-spacing: 0.5px; }
        .form-group input { 
            width: 100%; padding: 13px 15px; border: 2px solid #edf2f0; 
            border-radius: 12px; font-family: inherit; font-size: 0.9rem; transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-main { 
            background: var(--primary); color: white; border: none; padding: 15px; 
            border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; 
            font-size: 1rem; transition: var(--transition); margin-top: 10px;
        }
        .btn-main:hover { background: #0e3d11; transform: translateY(-2px); }

        /* --- DASHBOARD --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .welcome-box { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: var(--shadow); margin-bottom: 30px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .welcome-box h2 { font-size: 1.2rem; }

        .progress-card { 
            background: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%); 
            color: white; padding: 30px; border-radius: 25px; margin-bottom: 35px; box-shadow: var(--shadow);
        }
        .bar-bg { background: rgba(255,255,255,0.2); height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-fill { background: white; height: 100%; width: 0%; transition: 0.8s ease; }

        /* GRID CARD VIEW */
        .grid-materi { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }
        .day-card { 
            background: white; padding: 25px; border-radius: 22px; 
            text-align: center; cursor: pointer; box-shadow: var(--shadow); 
            transition: var(--transition); border: 2px solid transparent;
        }
        .day-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .day-card.completed { background: #e8f5e9; border-color: var(--primary); }
        .day-card h4 { font-size: 1.1rem; margin: 10px 0 5px; }
        .day-card i { font-size: 1.5rem; color: var(--primary); }

        /* VIEWER */
        #viewer { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; }
        .viewer-nav { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        iframe { flex-grow: 1; border: none; width: 100%; }
        .btn-finish { background: #2196f3; color: white; border: none; padding: 18px; font-weight: 700; cursor: pointer; }

        @media (max-width: 600px) {
            .grid-materi { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <!-- HALAMAN AUTH -->
    <div id="auth-section" class="auth-wrapper hidden">
        <div class="auth-card">
            <div style="background:#e8f5e9; width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <i class="fa-solid fa-graduation-cap fa-2xl" style="color:var(--primary)"></i>
            </div>
            <h2 id="auth-title">Selamat Datang</h2>
            <p class="subtitle" id="auth-subtitle">Silakan masuk untuk akses kursus Anda</p>
            
            <div id="alert" style="color: #d9534f; font-size: 0.8rem; margin-bottom: 15px;" class="hidden"></div>

            <form id="auth-form">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="email" placeholder="email@contoh.com" required>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                </div>
                <div class="form-group" id="access-code-group">
                    <label>KODE AKSES PREMIUM</label>
                    <input type="text" id="access-code" placeholder="Masukkan kode unik pembeli">
                </div>
                <button type="submit" id="btn-submit" class="btn-main">Masuk</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.8rem; color: #7f8c8d;">
                <span id="toggle-text">Belum punya akun?</span> 
                <a href="#" id="toggle-auth" style="color:var(--primary); font-weight: 700; text-decoration: none;">Daftar Sekarang</a>
            </p>
        </div>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="dashboard-section" class="container hidden">
        <div class="welcome-box">
            <div>
                <h2 id="user-name">Halo, Pelajar!</h2>
                <p style="font-size: 0.8rem; color: #7f8c8d;">Mari kuasai Bahasa Inggris hari ini.</p>
            </div>
            <button onclick="handleLogout()" style="background:none; border:1px solid #ddd; padding:8px 15px; border-radius:10px; cursor:pointer;">Keluar</button>
        </div>

        <div class="progress-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <p style="font-weight:600; font-size:0.9rem;">Target Belajar 300 Hari</p>
                <h2 id="progress-text">0%</h2>
            </div>
            <div class="bar-bg"><div id="progress-fill"></div></div>
            <p id="progress-detail" style="font-size:0.8rem; opacity:0.9;">Selesaikan materi untuk menaikkan progres.</p>
        </div>

        <h3 style="margin-bottom: 20px;">Daftar Materi</h3>
        <div class="grid-materi" id="materi-grid"></div>
    </div>

    <!-- VIEWER MATERI -->
    <div id="viewer" class="hidden">
        <div class="viewer-nav">
            <button onclick="closeViewer()" style="border:none; background:none; cursor:pointer;"><i class="fa-solid fa-xmark fa-xl"></i></button>
            <h4 id="view-title">Materi</h4>
            <div style="width:20px;"></div>
        </div>
        <iframe id="content-frame" src=""></iframe>
        <button id="btn-mark-complete" class="btn-finish">Selesaikan Materi Ini</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // GANTI DENGAN CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyA0aIG6_HpP_JTrKQPG1mzoAsyu4KotaHk",
            authDomain: "english300-e6dd6.firebaseapp.com",
            projectId: "english300-e6dd6",
            storageBucket: "english300-e6dd6.firebasestorage.app",
            messagingSenderId: "1036309233436",
            appId: "1:1036309233436:web:a43155ff8762f4d66684d9",
            measurementId: "G-21KSJDDXMY"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;
        let currentUser = null;
        let completedDays = [];

        // Auth Handler
        const authForm = document.getElementById('auth-form');
        const toggleAuthBtn = document.getElementById('toggle-auth');

        toggleAuthBtn.onclick = (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "Selamat Datang" : "Daftar Akun";
            document.getElementById('btn-submit').textContent = isLoginMode ? "Masuk" : "Daftar & Aktivasi";
            document.getElementById('access-code-group').classList.toggle('hidden', isLoginMode);
            document.getElementById('toggle-text').textContent = isLoginMode ? "Belum punya akun?" : "Sudah punya akun?";
            toggleAuthBtn.textContent = isLoginMode ? "Daftar Sekarang" : "Login di sini";
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await fetchProgress();
                showSection('dashboard');
            } else {
                showSection('auth');
            }
            document.getElementById('loader').classList.add('hidden');
        });

        async function fetchProgress() {
            const docRef = doc(db, "users", currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) completedDays = docSnap.data().completed || [];
            else await setDoc(docRef, { completed: [] });
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('materi-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 300; i++) {
                const card = document.createElement('div');
                card.className = `day-card ${completedDays.includes(i) ? 'completed' : ''}`;
                card.innerHTML = `<i class="fa-solid fa-book"></i><h4>Hari ${i}</h4><p style="font-size:0.7rem; color:#7f8c8d;">${completedDays.includes(i) ? 'SELESAI' : 'BELUM'}</p>`;
                card.onclick = () => openViewer(i);
                grid.appendChild(card);
            }
            const pct = Math.round((completedDays.length / 300) * 100);
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent = pct + '%';
            document.getElementById('progress-detail').textContent = `${completedDays.length} dari 300 hari selesai.`;
            document.getElementById('user-name').textContent = `Halo, ${currentUser.email.split('@')[0]}!`;
        }

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const code = document.getElementById('access-code').value;
            const alertBox = document.getElementById('alert');
            alertBox.classList.add('hidden');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // CEK KODE AKSES DI FIRESTORE
                    const codeRef = doc(db, "accessCodes", code.toUpperCase().trim());
                    const codeSnap = await getDoc(codeRef);
                    if (!codeSnap.exists() || codeSnap.data().isUsed) {
                        throw new Error("Kode Akses tidak valid atau sudah terpakai!");
                    }
                    await createUserWithEmailAndPassword(auth, email, password);
                    await updateDoc(codeRef, { isUsed: true, usedBy: email });
                }
            } catch (err) {
                alertBox.textContent = err.message;
                alertBox.classList.remove('hidden');
            }
        };

        let currentDayOpen = 0;
        window.openViewer = (day) => {
            currentDayOpen = day;
            document.getElementById('view-title').textContent = "Materi Hari " + day;
            document.getElementById('content-frame').src = `hari${day}.html`;
            document.getElementById('viewer').classList.remove('hidden');
            document.getElementById('btn-mark-complete').disabled = completedDays.includes(day);
            document.getElementById('btn-mark-complete').textContent = completedDays.includes(day) ? "Sudah Selesai" : "Selesaikan Materi Ini";
        };

        window.closeViewer = () => {
            document.getElementById('viewer').classList.add('hidden');
            document.getElementById('content-frame').src = "";
        };

        document.getElementById('btn-mark-complete').onclick = async () => {
            const docRef = doc(db, "users", currentUser.uid);
            await updateDoc(docRef, { completed: arrayUnion(currentDayOpen) });
            completedDays.push(currentDayOpen);
            renderGrid();
            closeViewer();
        };

        window.handleLogout = () => signOut(auth);
        function showSection(id) {
            document.getElementById('auth-section').classList.toggle('hidden', id !== 'auth');
            document.getElementById('dashboard-section').classList.toggle('hidden', id !== 'dashboard');
        }
    </script>
</body>
</html>
