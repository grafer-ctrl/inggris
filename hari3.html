<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking Patterns Quiz</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #ffffff;
            --text: #1f2937;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #f9fafb; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            color: var(--text);
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-home {
            text-decoration: none;
            color: var(--primary);
            font-size: 24px;
            display: flex;
            align-items: center;
        }

        .container { 
            width: 90%; 
            max-width: 500px; 
            background: white; 
            margin: 30px auto; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: var(--shadow);
            text-align: center;
        }

        .intro-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #4b5563;
            margin-bottom: 20px;
            background: #f3f4f6;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ef4444;
            margin: 10px 0;
        }

        #question {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 25px 0;
            color: var(--primary);
            min-height: 60px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        
        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 1rem;
        }

        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: #f3f4f6; color: var(--text); width: 100%; }
        .btn-audio { background: #10b981; color: white; margin-top: 10px; }
        
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }

        .key-box {
            background: #eef2ff;
            border: 2px solid var(--primary);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input[type="number"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-home">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
    <div style="font-weight: bold;">Speaking Practice</div>
    <div style="width: 28px;"></div>
</header>

<div class="container">
    <!-- Intro Screen -->
    <div id="intro-screen">
        <h2 style="margin-top: 0;">Cepat Lancar Ngomong!</h2>
        <div class="intro-text">
            <b>Instruksi:</b><br>
            Dengarkan soal dalam bahasa Indonesia, lalu sebutkan bahasa Inggrisnya dengan keras sebelum waktu habis. Jangan bingung, kunci jawaban tersedia untuk membantu kamu!
        </div>
        <div style="margin-bottom: 20px;">
            Set Waktu: <input type="number" id="user-timer" value="5"> Detik
        </div>
        <button class="btn-primary" onclick="startQuiz()">Mulai Sekarang</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <div class="timer-display" id="timer">5</div>
        <div style="color: #6b7280; font-size: 0.9rem;">Terjemahkan kalimat ini:</div>
        <div id="question">Memuat soal...</div>
        
        <div class="btn-group">
            <button id="btn-show" class="btn-primary" onclick="showAnswer()">Lihat Jawaban</button>
            <button id="btn-next" class="btn-outline hidden" onclick="nextQuestion()">Soal Berikutnya →</button>
        </div>

        <div id="key" class="hidden key-box">
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--primary);" id="correct"></div>
            <div style="margin: 10px 0; color: #4b5563;">Cara baca: <i id="spelling"></i></div>
            <button class="btn-audio" onclick="playAudio('en')" style="width: 100%;">🔊 Dengar Suara Inggris</button>
        </div>
    </div>
</div>

let current = 0;
let time = 5;
let timerInterval;

function startQuiz(){
    document.getElementById("intro-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    nextQuestion();
}

function nextQuestion(){
    current = Math.floor(Math.random() * data.length);
    document.getElementById("question").innerText = data[current].q;
    document.getElementById("key").classList.add("hidden");
    document.getElementById("btn-next").classList.add("hidden");
    document.getElementById("btn-show").classList.remove("hidden");
    
    // Set Waktu
    let userSetTime = document.getElementById("user-timer").value;
    time = userSetTime ? parseInt(userSetTime) : 5;
    
    // Play Audio Indonesia Otomatis
    playAudio('id');
    startTimer();
}

function startTimer(){
    document.getElementById("timer").innerText = time;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time--;
        document.getElementById("timer").innerText = time;
        if(time <= 0){
            clearInterval(timerInterval);
            showAnswer();
        }
    }, 1000);
}

function showAnswer(){
    clearInterval(timerInterval);
    document.getElementById("key").classList.remove("hidden");
    document.getElementById("correct").innerText = data[current].a;
    document.getElementById("spelling").innerText = data[current].spell;
    document.getElementById("btn-show").classList.add("hidden");
    document.getElementById("btn-next").classList.remove("hidden");
}

function playAudio(langType){
    let text = (langType === 'id') ? data[current].q : data[current].a;
    let langCode = (langType === 'id') ? "id-ID" : "en-US";
    
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = langCode;
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}
</script>

</html>
